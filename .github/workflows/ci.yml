name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  hook-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: brew install jq || true
      - name: Install jq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y jq
      - name: Run hook fixtures
        run: bash hooks/tests/run-all.sh

  validate-plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate marketplace manifest (strict)
        run: claude plugin validate . --strict
      - name: Validate each plugin (strict)
        run: |
          for d in plugins/*/; do
            echo "== $d"
            claude plugin validate "$d" --strict
          done
